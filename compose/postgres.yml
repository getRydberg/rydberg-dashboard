services:
  postgres:
    image: postgres:16-alpine
    container_name: rydberg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - rydberg-net

volumes:
  pgdata:

networks:
  rydberg-net:
    external: true