services:
  frontend-dashboard:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rydberg-frontend-dashboard
    restart: unless-stopped
    profiles:
      - dashboard-core
      - dashboard-full
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: sh -lc "npm install --include=optional && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    networks:
      - rydberg-net

networks:
  rydberg-net:
    external: true