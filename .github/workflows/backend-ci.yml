name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      # Lint only for now. Once there's real code + tests, add:
      #   - pip install -r requirements.txt
      #   - pytest
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .