# Rydberg — root compose entry point.
#
# This file does almost nothing itself: it just includes the per-service
# compose files under ./compose. Run everything from here:
#   
#   docker compose --profile full up -d           # everything
#   docker compose --profile core up -d           # postgres + backend + frontend
#   docker compose --profile vllm up -d      # vLLM
#   docker compose ps                             # see the whole stack
#   docker compose down                           # stop the whole stack
#
# Each service lives in its own file under compose/ for easier editing,
# but you always drive the stack from this root file.

include:
  - compose/postgres.yml
  - compose/backend.yml
  - compose/frontend.yml
  - compose/vllm.yml
